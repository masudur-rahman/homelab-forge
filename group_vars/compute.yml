redis_host: cache.mrahman.xyz
redis_password: "{{ vault_redis_password }}"
redis_port: 6379

postgres_host: data.mrahman.xyz
postgres_user: "postgres"
postgres_root_password: "{{ vault_postgres_root_password }}"
postgres_port: 5432

# Ingress (Nginx Reverse Proxy)
ingress_root_domain: "mrahman.xyz"
ingress_cert_email: "masudjuly02@gmail.com"
ingress_sites:
  - domain: "gateway.mrahman.xyz"
    upstream: "http://10.66.0.1"
    force_ip_header: true
  - domain: "proxmox.mrahman.xyz"
    upstream: "https://10.66.0.10:8006"
    websocket: true
  - domain: "adguard.mrahman.xyz"
    upstream: "http://10.66.0.253:3000"
    websocket: false
  - domain: "status.mrahman.xyz"
    upstream: "http://10.66.0.40:3001"
    websocket: true
  - domain: "netdata.mrahman.xyz"
    upstream: "http://10.66.0.40:19999"
    websocket: false

monitoring_admin_user: admin

porkbun_api_key: "{{ vault_porkbun_api_key }}"
porkbun_secret_key: "{{ vault_porkbun_secret_key }}"

# Expense Tracker Bot Config
expense_bot_version: "v1.3.3"
expense_bot_token: "{{ vault_expense_bot_token }}"
expense_bot_openrouter_key: "{{ vault_expense_bot_openrouter_key }}"
expense_bot_user: "masudur_rahman"

# Database Config
expense_db_host: "{{ postgres_host }}"
expense_db_port: "{{ postgres_port }}"
expense_db_user: "{{ postgres_user }}"
expense_db_pass: "{{ postgres_root_password }}"
expense_db_name: "expense"

# Redis / Cache Config
expense_cache_type: "redis" # Options: redis, map
expense_redis_host: "{{ redis_host }}"
expense_redis_port: "{{ redis_port }}"
expense_redis_pass: "{{ redis_password }}"

# Uptime Kuma Monitors (automated setup)
# Targets can be hostnames (resolved to ansible_host) or full URLs
monitoring_uptime_kuma_monitors:
  # Infrastructure (Nodes)
  - { name: "gateway-01", type: "ping", target: "gateway-01", category: "Infrastructure" }
  - { name: "gateway-02", type: "ping", target: "gateway-02", category: "Infrastructure" }
  - { name: "portal-01", type: "ping", target: "portal-01", category: "Infrastructure" }
  - { name: "data-01", type: "ping", target: "data-01", category: "Infrastructure" }
  - { name: "expense-tracker-01", type: "ping", target: "expense-tracker-01", category: "Infrastructure" }
  - { name: "monitoring-01", type: "ping", target: "monitoring-01", category: "Infrastructure" }

  # Core Services
  - { name: "Router Dashboard", type: "http", target: "https://gateway.mrahman.xyz", category: "Services" }
  - { name: "AdGuard Admin", type: "http", target: "http://adguard.mrahman.xyz", category: "Services" }
  - { name: "WireGuard Server", type: "ping", target: "gateway-01", category: "Services" }

  # Databases & Workloads
  - name: "PostgreSQL"
    type: "port"
    target: "data-01"
    port: 5432
    category: "Databases"
  - name: "Redis"
    type: "port"
    target: "data-01"
    port: 6379
    category: "Databases"
  - name: "Expense Tracker Bot"
    type: "http"
    target: "http://10.66.0.50:8080/healthz"
    category: "Apps"

  # Monitoring
  - name: "Netdata Dashboard"
    type: "http"
    target: "https://netdata.mrahman.xyz"
    category: "Monitoring"
  - name: "Uptime Kuma"
    type: "http"
    target: "http://localhost:3001"
    category: "Monitoring"
