---
- name: Install WireGuard
  apt:
    name: wireguard
    state: present

- name: Enable IPv4 forwarding
  sysctl:
    name: net.ipv4.ip_forward
    value: '1'
    sysctl_set: yes
    state: present
    reload: yes

- name: Deploy Server Private Key
  copy:
    content: "{{ lookup('file', vpn_wireguard_key_path + '/server.key') }}"
    dest: /etc/wireguard/private.key
    mode: '0600'
  notify: Restart WireGuard

- name: Deploy Server Config (wg0.conf)
  template:
    src: wg0.conf.j2
    dest: /etc/wireguard/wg0.conf
    mode: '0600'
  notify: Restart WireGuard

- name: Register WireGuard Health Check
  copy:
    dest: /etc/keepalived/checks.d/wireguard.sh
    mode: '0755'
    content: |
      #!/bin/bash

      if ! wg show wg0 > /dev/null 2>&1; then
          exit 1
      fi

      if ip link show wg0 | grep -qE "state (UP|UNKNOWN)"; then
          exit 0
      else
          # State is likely 'DOWN' or 'DORMANT'
          exit 1
      fi
  ignore_errors: yes
