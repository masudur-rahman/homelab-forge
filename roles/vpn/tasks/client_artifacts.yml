---
- name: Install QR Encode (Required for Artifacts)
  apt:
    name: qrencode
    state: present

- name: Create Temporary Artifact Directory
  file:
    path: /tmp/wg_artifacts
    state: directory
    mode: '0700'

# Generate .conf files from Local Keys -> Remote Temp
- name: Generate Client Configs (Remote Temp)
  template:
    src: client.conf.j2
    dest: "/tmp/wg_artifacts/{{ client.name }}.conf"
    mode: '0600'
  loop: "{{ vpn_wireguard_clients }}"
  loop_control:
    loop_var: client

# Generate QR Codes
- name: Generate QR Codes
  shell: |
    qrencode -t PNG -o "/tmp/wg_artifacts/{{ client.name }}.png" < "/tmp/wg_artifacts/{{ client.name }}.conf"
  args:
    creates: "/tmp/wg_artifacts/{{ client.name }}.png"
  loop: "{{ vpn_wireguard_clients }}"
  loop_control:
    loop_var: client

# Fetch Everything Once
- name: Fetch Client Artifacts
  fetch:
    src: "/tmp/wg_artifacts/{{ client.0.name }}.{{ client.1 }}"
    dest: "{{ vpn_wireguard_key_path }}/"
    flat: yes
  loop: "{{ vpn_wireguard_clients | product(['conf', 'png']) | list }}"
  loop_control:
    loop_var: client

# Cleanup
- name: Remove Temporary Artifacts
  file:
    path: /tmp/wg_artifacts
    state: absent
