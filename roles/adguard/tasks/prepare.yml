---
- name: Check current DNS connectivity
  ansible.builtin.command: host google.com
  register: adguard_dns_check
  failed_when: false
  changed_when: false

- name: Check if systemd-resolved is causing a conflict
  ansible.builtin.service_facts:

- name: Bootstrap DNS & Free Port 53
  when: >-
    adguard_dns_check.rc != 0 or
    (ansible_facts.services['systemd-resolved.service'] is defined and
     ansible_facts.services['systemd-resolved.service'].state == 'running')
  block:
    - name: Stop systemd-resolved
      ansible.builtin.service:
        name: systemd-resolved
        state: stopped
        enabled: false

    - name: Remove broken resolv.conf symlink
      ansible.builtin.file:
        path: /etc/resolv.conf
        state: absent

    - name: Set temporary bootstrap DNS (1.1.1.1)
      ansible.builtin.copy:
        dest: /etc/resolv.conf
        content: "nameserver 1.1.1.1"
        mode: '0644'
