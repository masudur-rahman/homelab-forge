---
- name: Configure System DNS (systemd-resolved)
  lineinfile:
    path: /etc/systemd/resolved.conf
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
    state: present
  loop:
    - { regexp: '^#?DNS=', line: "DNS={{ primary_dns }}" }
    - { regexp: '^#?FallbackDNS=', line: "FallbackDNS={{ fallback_dns | default('1.1.1.1') }}" }
    - { regexp: '^#?Domains=', line: "Domains={{ search_domain }}" }
  notify: Restart systemd-resolved

- name: Ensure resolv.conf points to systemd-resolved
  file:
    src: /run/systemd/resolve/stub-resolv.conf
    dest: /etc/resolv.conf
    state: link
    force: yes
  notify: Restart systemd-resolved
